name: Verify CI Secrets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. See docs/CI_OPS.md."
            exit 1
          fi
          WHOAMI=$(npm whoami 2>&1) || {
            echo "::error::NPM_TOKEN is invalid or expired (npm whoami failed: $WHOAMI). See docs/CI_OPS.md."
            exit 1
          }
          echo "✅ NPM_TOKEN is valid (authenticated as: $WHOAMI)"

      - name: Check CI_APP_ID
        run: |
          if [ -z "${{ secrets.CI_APP_ID }}" ]; then
            echo "::error::CI_APP_ID secret is not set. See docs/CI_OPS.md."
            exit 1
          fi
          echo "✅ CI_APP_ID is set"

      - name: Check CI_APP_PRIVATE_KEY
        run: |
          if [ -z "${{ secrets.CI_APP_PRIVATE_KEY }}" ]; then
            echo "::error::CI_APP_PRIVATE_KEY secret is not set. See docs/CI_OPS.md."
            exit 1
          fi
          echo "✅ CI_APP_PRIVATE_KEY is set"

      - name: Check GitHub App token generation
        uses: actions/create-github-app-token@v1
        id: app_token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Verify GitHub App token works
        run: |
          echo "✅ GitHub App token generated successfully"

      - name: Summary
        run: |
          echo "## ✅ All CI secrets verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| NPM_TOKEN | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
          echo "| CI_APP_ID | ✅ Set |" >> $GITHUB_STEP_SUMMARY
          echo "| CI_APP_PRIVATE_KEY | ✅ Set |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub App token | ✅ Generated |" >> $GITHUB_STEP_SUMMARY
